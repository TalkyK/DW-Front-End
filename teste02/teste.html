<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #0f0f1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
}

canvas {
    background: #111;
    box-shadow: 0 0 25px #00ffcc;
}

#ui {
    margin-bottom: 10px;
}
</style>
</head>
<body>

<div id="ui">
    Pontos: <span id="score">0</span> |
    Recorde: <span id="highscore">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
let snake = [{x: 160, y: 160}];
let dx = grid;
let dy = 0;
let food = randomFood();
let score = 0;
let speed = 150;
let highscore = localStorage.getItem("highscore") || 0;

document.getElementById("highscore").innerText = highscore;

function randomFood() {
    return {
        x: Math.floor(Math.random() * 20) * grid,
        y: Math.floor(Math.random() * 20) * grid
    };
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
    if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
    if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
    if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
});

function gameLoop() {
    setTimeout(() => {
        requestAnimationFrame(gameLoop);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        // Comer comida
        if (head.x === food.x && head.y === food.y) {
            score++;
            speed = Math.max(50, speed - 5);
            document.getElementById("score").innerText = score;
            food = randomFood();
        } else {
            snake.pop();
        }

        // Colisão parede
        if (
            head.x < 0 || head.x >= canvas.width ||
            head.y < 0 || head.y >= canvas.height
        ) {
            return resetGame();
        }

        // Colisão corpo
        for (let i = 1; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) {
                return resetGame();
            }
        }

        // Desenhar comida
        ctx.fillStyle = "#ff00ff";
        ctx.fillRect(food.x, food.y, grid, grid);

        // Desenhar snake
        snake.forEach((part, index) => {
            ctx.fillStyle = index === 0 ? "#00ffcc" : "#009988";
            ctx.fillRect(part.x, part.y, grid - 2, grid - 2);
        });

    }, speed);
}

function resetGame() {
    if (score > highscore) {
        highscore = score;
        localStorage.setItem("highscore", highscore);
        document.getElementById("highscore").innerText = highscore;
    }

    alert("Game Over! Pontos: " + score);

    snake = [{x: 160, y: 160}];
    dx = grid;
    dy = 0;
    score = 0;
    speed = 150;
    document.getElementById("score").innerText = 0;
    food = randomFood();
}

gameLoop();
</script>

</body>
</html>
