<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="atv.css">
    <title>Document</title>
</head>
<body>
    <h1>Lista</h1>

    <h2>Lista ordenadas</h2>
    <ol type="I">
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
        <li>Quarto item</li>
        <li>Quinto item</li>
    </ol>
    <h2>Lista não ordenadas</h2>
    <ul type="square">
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
        <li>Quarto item</li>
        <li>Quinto item</li>
    </ul>

</body>
</html>
